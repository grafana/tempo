partition_ring_live_store: true
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

backend_scheduler:
  provider:
    compaction:
      compaction:
        block_retention: 1h

backend_worker:
  backend_scheduler_addr: backend-scheduler:3200
  compaction:
    block_retention: 1h
  ring:
    kvstore:
      store: memberlist

querier:
  query_live_store: true

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: replay-lab
  storage:
    path: /var/tempo/generator/wal
    remote_write: []

query_frontend:
  rf1_after: "1999-01-01T00:00:00Z"
  mcp_server:
    enabled: true

storage:
  trace:
    backend: s3
    s3:
      bucket: tempo-replay-lab-trial-105722
      endpoint: minio:9000
      access_key: tempo
      secret_key: supersecret
      insecure: true
    wal:
      path: /var/tempo/wal
    block:
      version: vParquet4
      parquet_row_group_size_bytes: 100000000

live_store:
  flush_check_period: 5s
  max_trace_idle: 5s
  max_trace_live: 30s
  max_block_duration: 1m
  max_block_bytes: 104857600
  complete_block_timeout: 1h

overrides:
  defaults:
    ingestion:
      rate_strategy: local
      rate_limit_bytes: 200000000
      burst_size_bytes: 400000000
      max_traces_per_user: 0
      max_global_traces_per_user: 0
    read:
      max_bytes_per_tag_values_query: 50000000
    global:
      max_bytes_per_trace: 50000000
    metrics_generator:
      processors: []
      generate_native_histograms: both

usage_report:
  reporting_enabled: false
