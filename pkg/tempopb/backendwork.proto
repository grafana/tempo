syntax = "proto3";

package tempopb;

import "github.com/gogo/protobuf/gogoproto/gogo.proto";

option (gogoproto.marshaler_all) = true;
option (gogoproto.unmarshaler_all) = true;

service BackendScheduler {
  // Get next available job
  rpc Next(NextJobRequest) returns (NextJobResponse) {}

  // Update job status
  rpc UpdateJob(UpdateJobStatusRequest) returns (UpdateJobStatusResponse) {}

  // Submit a redaction request. The caller provides a tenant ID and trace IDs to remove.
  // The scheduler discovers all blocks for the tenant and fans out one internal pending
  // job per block.
  rpc SubmitRedaction(SubmitRedactionRequest) returns (SubmitRedactionResponse) {}
}

enum JobType {
  JOB_TYPE_UNSPECIFIED = 0;
  JOB_TYPE_COMPACTION = 1;
  JOB_TYPE_RETENTION = 2;
  JOB_TYPE_REDACTION = 3;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_SUCCEEDED = 1;
  JOB_STATUS_FAILED = 2;
  JOB_STATUS_RUNNING = 3;
}

// CompactionDetail contains fields specific to compaction jobs
message CompactionDetail {
  option (gogoproto.equal) = true;
  option (gogoproto.compare) = true;

  repeated string input = 1;  // block IDs for compaction
  repeated string output = 2;  // block IDs resulting from compaction
}
message RetentionDetail {
  option (gogoproto.equal) = true;
  option (gogoproto.compare) = true;
}

// RedactionMode selects whether a redaction applies (rewrites blocks) or is a dry run
// (evaluates and counts matches without modifying storage).
enum RedactionMode {
  REDACTION_MODE_APPLY = 0;    // default: rewrite blocks, removing matched traces
  REDACTION_MODE_DRY_RUN = 1;  // evaluate and count matches, never rewrite
}

// TraceQLSelector carries a TraceQL expression that selects the traces to redact,
// as an alternative to an explicit trace ID list. Restricted at submission to a single
// spanset filter (=, != on resource.*/span.* joined by && / ||).
message TraceQLSelector {
  option (gogoproto.equal) = true;
  option (gogoproto.compare) = true;

  string query = 1;  // TraceQL expression
}

// RedactionDetail contains fields for redaction jobs (one job per block).
// TraceIds are the trace IDs to redact from the block; alternatively query selects
// them via a TraceQL expression evaluated against the block.
message RedactionDetail {
  option (gogoproto.equal) = true;
  option (gogoproto.compare) = true;

  string block_id = 1;       // block to redact
  repeated bytes trace_ids = 2;  // trace IDs to remove from the block
  TraceQLSelector query = 3;     // when set, select traces via TraceQL instead of trace_ids
  RedactionMode mode = 4;        // apply vs dry-run for this job
}

// JobDetail contains the specific details for each job type
message JobDetail {
  option (gogoproto.equal) = true;  // Keep equal but remove compare

  string tenant = 1;
  // oneof detail {
    CompactionDetail compaction = 2;
    RetentionDetail retention = 3;
    RedactionDetail redaction = 4;
  // }

  // batch_id groups the pending jobs that were created from a single SubmitRedaction
  // call. Enables future Status/Cancel RPCs keyed on the original submission.
  string batch_id = 5;
}

message NextJobRequest {
  string worker_id = 1;
}

message NextJobResponse {
  string job_id = 1;
  JobType type = 2;
  JobDetail detail = 3 [(gogoproto.nullable) = false];
}

message UpdateJobStatusRequest {
  string job_id = 1;
  JobStatus status = 2;
  string error = 3;  // populated if status is FAILED
  CompactionDetail compaction = 4;
  RedactionResult redaction = 5;
}

message UpdateJobStatusResponse {
  bool success = 1;
}

// SubmitRedactionRequest is the user-facing API for redacting traces from a tenant.
// The scheduler fans out one internal pending job per block for the authenticated tenant.
// The tenant is sourced exclusively from the X-Scope-OrgID request header; the server
// ignores tenant_id in the body to prevent cross-tenant escalation.
message SubmitRedactionRequest {
  string tenant_id = 1 [deprecated = true]; // ignored by the server; tenant is read from the request header
  repeated bytes trace_ids = 2;
  // selector is a single-member oneof for now, reserving room to migrate trace_ids into
  // it later without an API break. It carries the TraceQL query selector; query and
  // trace_ids are mutually exclusive, enforced at submission.
  oneof selector {
    TraceQLSelector query = 3;
  }
  RedactionMode mode = 4;  // apply (default) vs dry-run
}

message SubmitRedactionResponse {
  // batch_id identifies this submission; all resulting pending block jobs share this ID.
  string batch_id = 1;
  // jobs_created is the number of pending block-level redaction jobs that were enqueued.
  int32 jobs_created = 2;
}

// RedactionResult is reported by the worker when a redaction job completes.
message RedactionResult {
  option (gogoproto.equal) = true;

  // traces_found is the number of target trace IDs that were present and removed
  // from the block. Zero means the block was scanned and found clean.
  int32 traces_found = 1;
}

// RedactionBatch holds the trace IDs for an in-flight redaction submission.
// All pending block jobs for a tenant share one batch to avoid copying the trace ID
// list into every job (which could be millions of jobs for large tenants).
// Persisted locally as batches.pb alongside the shard files.
message RedactionBatch {
  option (gogoproto.equal) = true;

  string batch_id = 1;
  string tenant_id = 2;
  repeated bytes trace_ids = 3;
  int64 created_at_unix_nano = 4;
  // skipped_compaction_job_ids holds the IDs of compaction jobs whose input
  // blocks were skipped at submission time because they were actively compacting.
  // At rescan time the scheduler looks up these jobs and creates redaction jobs
  // for their output blocks.
  repeated string skipped_compaction_job_ids = 5;
  // rescan_after_unix_nano is the earliest time at which the scheduler should
  // perform the rescan described above. Zero means no rescan is pending.
  int64 rescan_after_unix_nano = 6;
  // query, when set, selects traces via a TraceQL expression instead of trace_ids.
  // Stored in the manifest for the lifetime of the redaction and injected into each
  // per-block job.
  TraceQLSelector query = 7;
  // mode selects apply (default) vs dry-run for the whole batch.
  RedactionMode mode = 8;
}

// RedactionBatches is the top-level container written to batches.pb.
message RedactionBatches {
  repeated RedactionBatch batches = 1;
}
