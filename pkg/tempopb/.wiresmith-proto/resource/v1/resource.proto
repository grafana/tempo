syntax = "proto3";

package tempopb.resource.v1;

import "common/v1/common.proto";
import "wiresmith/options.proto";

// Drop the XXX_fieldsPresent bitmap: gogo never generated Has methods or
// presence tracking for these messages, the exported bitmap would leak
// into encoding/json output, and the declared-fields-only layout matches
// gogo's nullable=false structs.
option (wiresmith.options.no_presence_all) = true;

option csharp_namespace = "OpenTelemetry.Proto.Resource.V1";
option java_multiple_files = true;
option java_package = "io.tempopb.resource.v1";
option java_outer_classname = "ResourceProto";
option go_package = "github.com/grafana/tempo/pkg/tempopb/resource/v1;v1";

// Resource information.
message Resource {
  // Set of attributes that describe the resource.
  // Attribute keys MUST be unique (it is not allowed to have more than one
  // attribute with the same key).
  repeated tempopb.common.v1.KeyValue attributes = 1;

  // dropped_attributes_count is the number of dropped attributes. If the value is 0, then
  // no attributes were dropped.
  uint32 dropped_attributes_count = 2;

  // Set of entities that participate in this Resource.
  //
  // Note: keys in the references MUST exist in attributes of this message.
  //
  // Status: [Development]
  repeated tempopb.common.v1.EntityRef entity_refs = 3 [(wiresmith.options.pointer) = true];
}
