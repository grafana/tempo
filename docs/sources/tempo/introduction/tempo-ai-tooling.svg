<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6e6e6e"/>
    </marker>
  </defs>

  <!-- AI Agent box -->
  <rect x="20" y="170" width="140" height="80" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="1.5"/>
  <text x="90" y="205" text-anchor="middle" font-weight="600" font-size="14" fill="#1a1a1a">AI Agent</text>
  <text x="90" y="225" text-anchor="middle" font-size="11" fill="#6e6e6e">(Claude, Cursor, custom)</text>

  <!-- Tempo group label -->
  <rect x="280" y="16" width="380" height="180" rx="8" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="470" y="40" text-anchor="middle" font-weight="600" font-size="14" fill="#3b82f6">Tempo</text>

  <!-- MCP server box -->
  <rect x="300" y="54" width="340" height="60" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="470" y="76" text-anchor="middle" font-weight="600" font-size="12" fill="#1a1a1a">MCP server  /api/mcp</text>
  <text x="470" y="102" text-anchor="middle" font-size="10" fill="#6e6e6e">7 tools | 4 doc resources | TraceQL | metrics | attributes</text>

  <!-- HTTP API box -->
  <rect x="300" y="124" width="340" height="60" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="470" y="148" text-anchor="middle" font-weight="600" font-size="12" fill="#1a1a1a">HTTP API  (LLM-optimized)</text>
  <text x="470" y="172" text-anchor="middle" font-size="10" fill="#6e6e6e">Accept: application/vnd.grafana.llm</text>

  <!-- Grafana tools group label -->
  <rect x="280" y="224" width="380" height="180" rx="8" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="470" y="248" text-anchor="middle" font-weight="600" font-size="14" fill="#8b5cf6">Grafana tools</text>

  <!-- gcx box -->
  <rect x="300" y="262" width="340" height="56" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="470" y="284" text-anchor="middle" font-weight="600" font-size="12" fill="#1a1a1a">gcx</text>
  <text x="470" y="306" text-anchor="middle" font-size="10" fill="#6e6e6e">Dashboards | alerts | SLOs | Cloud | Enterprise | OSS v12+</text>

  <!-- assistant-cli box -->
  <rect x="300" y="330" width="340" height="56" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="470" y="352" text-anchor="middle" font-weight="600" font-size="12" fill="#1a1a1a">assistant-cli</text>
  <text x="470" y="374" text-anchor="middle" font-size="10" fill="#6e6e6e">Cross-signal investigation | A2A API | Grafana Cloud</text>

  <!-- Arrows: agent to each row, no crossings -->
  <line x1="160" y1="193" x2="292" y2="84" stroke="#6e6e6e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="203" x2="292" y2="154" stroke="#6e6e6e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="217" x2="292" y2="290" stroke="#6e6e6e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="227" x2="292" y2="358" stroke="#6e6e6e" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
