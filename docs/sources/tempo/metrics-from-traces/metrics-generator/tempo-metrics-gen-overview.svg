<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 275">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78909C"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Metrics-generator architecture</text>

  <!-- Row 1: Application → Distributor → Kafka -->

  <rect x="70" y="38" width="130" height="54" rx="6" fill="#EDE7F6" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="135" y="59" text-anchor="middle" font-size="13" font-weight="500" fill="#333">Application</text>
  <text x="135" y="74" text-anchor="middle" font-size="11" fill="#666">(traces)</text>

  <line x1="200" y1="65" x2="232" y2="65" stroke="#78909C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="235" y="38" width="130" height="54" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="300" y="59" text-anchor="middle" font-size="13" font-weight="500" fill="#333">Distributor</text>
  <text x="300" y="74" text-anchor="middle" font-size="11" fill="#666">(Tempo)</text>

  <line x1="365" y1="65" x2="397" y2="65" stroke="#78909C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="400" y="38" width="130" height="54" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="465" y="69" text-anchor="middle" font-size="13" font-weight="500" fill="#333">Kafka</text>

  <!-- Arrow: Kafka down to Metrics-generator container -->
  <line x1="465" y1="92" x2="465" y2="130" stroke="#78909C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Metrics-generator container (aligned to Application left → Kafka right) -->
  <rect x="70" y="133" width="460" height="130" rx="8" fill="#FFF8F0" stroke="#F57C00" stroke-width="2"/>
  <text x="300" y="157" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Metrics-generator</text>
  <text x="300" y="172" text-anchor="middle" font-size="11" fill="#666">(Tempo)</text>

  <!-- Processors inside the container -->
  <rect x="90" y="184" width="122" height="48" rx="6" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
  <text x="151" y="212" text-anchor="middle" font-size="12" font-weight="500" fill="#333">Span metrics</text>

  <rect x="239" y="184" width="122" height="48" rx="6" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
  <text x="300" y="212" text-anchor="middle" font-size="12" font-weight="500" fill="#333">Service graphs</text>

  <rect x="388" y="184" width="122" height="48" rx="6" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
  <text x="449" y="212" text-anchor="middle" font-size="12" font-weight="500" fill="#333">Host info</text>

  <!-- Arrow: Metrics-generator to Prometheus/Mimir -->
  <line x1="530" y1="200" x2="627" y2="200" stroke="#78909C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="580" y="190" text-anchor="middle" font-size="9" fill="#78909C" font-style="italic">remote write</text>

  <!-- Prometheus / Mimir -->
  <rect x="632" y="173" width="155" height="54" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="709" y="194" text-anchor="middle" font-size="13" font-weight="500" fill="#333">Prometheus / Mimir</text>
  <text x="709" y="210" text-anchor="middle" font-size="11" fill="#666">(metrics storage)</text>
</svg>
