syntax = "proto3";

package backend.v1;

import "google/protobuf/timestamp.proto";
import "wiresmith/options.proto";

// Drop the XXX_fieldsPresent bitmap: gogo never generated Has methods or
// presence tracking for these messages, the exported bitmap would leak
// into encoding/json output, and the declared-fields-only layout matches
// gogo's nullable=false structs.
option (wiresmith.options.no_presence_all) = true;

option go_package = "tempodb/backend";

message BlockMeta {
    string version = 1[(wiresmith.options.jsontag) = "format"];
    bytes block_id = 2[(wiresmith.options.jsontag) = "blockID", (wiresmith.options.customname) = "BlockID", (wiresmith.options.customtype) = "UUID"];
    string tenant_id = 5[(wiresmith.options.jsontag) = "tenantID", (wiresmith.options.customname) = "TenantID"];
    google.protobuf.Timestamp start_time = 6[(wiresmith.options.stdtime) = true, (wiresmith.options.jsontag) = "startTime"];
    google.protobuf.Timestamp end_time = 7[(wiresmith.options.stdtime) = true, (wiresmith.options.jsontag) = "endTime"];
    int64 total_objects = 8[(wiresmith.options.jsontag) = "totalObjects"];
    // Size_ avoids colliding with the generated Size() method, matching gogo's mangling.
    uint64 size = 9[(wiresmith.options.customname) = "Size_"];
    uint32 compaction_level = 10[(wiresmith.options.jsontag) = "compactionLevel"];
    // bytes encoding = 11[(gogoproto.customtype) = "Encoding", (gogoproto.nullable) = false];
    uint32 index_page_size = 12[(wiresmith.options.jsontag) = "indexPageSize"];
    uint32 total_records = 13[(wiresmith.options.jsontag) = "totalRecords"];
    // string data_encoding = 14[(gogoproto.jsontag) = "dataEncoding"];
    uint32 bloom_shard_count = 15[(wiresmith.options.jsontag) = "bloomShards"];
    uint32 footer_size = 16[(wiresmith.options.jsontag) = "footerSize"];
    bytes dedicated_columns = 17 [(wiresmith.options.customtype) = "DedicatedColumns", (wiresmith.options.jsontag) = "dedicatedColumns,omitempty"];
    uint32 replication_factor = 18[(wiresmith.options.jsontag) = "replicationFactor,omitempty"];
}

message CompactedBlockMeta {
    // gogo flattened this via (gogoproto.embed); wiresmith has no embed option,
    // so the field is named and the flat JSON shape (meta.compacted.json /
    // tenant index compatibility) is preserved by the hand-written
    // MarshalJSON/UnmarshalJSON in block_meta.go. The json tag opts the field
    // out of encoding/json so a tag-based marshal can never produce the nested
    // (incompatible) shape.
    BlockMeta block_meta = 1[(wiresmith.options.jsontag) = "-"];
    google.protobuf.Timestamp compacted_time = 2[(wiresmith.options.stdtime) = true, (wiresmith.options.jsontag) = "compactedTime"];
}

message TenantIndex {
    google.protobuf.Timestamp created_at = 1[(wiresmith.options.stdtime) = true, (wiresmith.options.jsontag) = "created_at"];
    repeated BlockMeta meta = 2[(wiresmith.options.jsontag) = "meta", (wiresmith.options.pointer) = true];
    repeated CompactedBlockMeta compacted_meta = 3[(wiresmith.options.jsontag) = "compacted", (wiresmith.options.pointer) = true];
}
