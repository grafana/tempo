target: all
server:
  http_listen_port: 3200
metrics_generator:
  processor:
    local_blocks:
      flush_to_metrics: true
    service_graphs:
      dimensions:
        - service.namespace
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
        - local-blocks
