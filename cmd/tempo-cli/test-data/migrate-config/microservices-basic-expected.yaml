# Generated by tempo-cli migrate config
# Review before deploying. Remove compaction_disabled after decommissioning 2.x.
ingest:
  kafka:
    address: kafka:9092
    topic: tempo-traces
overrides:
  defaults:
    compaction:
      compaction_disabled: true
    ingestion:
      rate_limit_bytes: 5000000
server:
  http_listen_port: 3200
storage:
  trace:
    backend: s3
    s3:
      bucket: tempo-traces
      endpoint: s3.amazonaws.com
    wal:
      path: /var/tempo/wal
target: distributor
