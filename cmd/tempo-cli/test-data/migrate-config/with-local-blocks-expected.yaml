# Generated by tempo-cli migrate config
# Review before deploying. Remove compaction_disabled after decommissioning 2.x.
metrics_generator:
  processor:
    service_graphs:
      dimensions:
      - service.namespace
overrides:
  defaults:
    compaction:
      compaction_disabled: true
    metrics_generator:
      processors:
      - service-graphs
      - span-metrics
server:
  http_listen_port: 3200
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
target: all
