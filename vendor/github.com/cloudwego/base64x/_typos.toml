# Typo check: https://github.com/crate-ci/typos

[files]
extend-exclude = ["go.mod", "go.sum", "check_branch_name.sh"]

[default.extend-words]
asure = "asure"
brillig = "brillig"
easure = "easure"
fo = "fo"
leasure = "leasure"
shll = "shll"
slithy = "slithy"
sur = "sur"
toves = "toves"
Twas = "Twas"
