# Weekly list of merged PRs on grafana/tempo for manual /docs-pr-check triage.
# Runs only on this fork (tempo-doc-work); does not modify grafana/tempo.
#
# Forks: enable Actions and allow scheduled workflows in the repo settings if jobs do not run.

name: Upstream docs PR candidates

on:
  schedule:
    # Mondays 09:00 UTC — adjust if you prefer another day
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      since_days:
        description: "Look back this many days for merged PRs"
        required: false
        default: "7"

permissions:
  contents: read
  issues: write

jobs:
  open-triage-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create triage issue from upstream merges
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_REPO: grafana/tempo
          SINCE_DAYS: ${{ github.event.inputs.since_days || '7' }}
        run: |
          chmod +x scripts/docs-upstream-pr-candidates.sh
          ./scripts/docs-upstream-pr-candidates.sh
