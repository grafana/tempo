# Changelog entry. Generate a copy with `make chlog-new`, then fill in the fields.

# One of: breaking | change | feature | enhancement | bug_fix | security
change_type: feature

# Component or area of the change. Must be one of the components in .chloggen/config.yaml,
# e.g. distributor, querier, query-frontend, storage, operations.
component: bloom-gateway

# A brief description of the change. Surround with quotes ("") if it must start with a backtick (`).
note: add the bloom gateway core module (new `bloom-gateway` target) — a stateful, ring-partitioned service that indexes (trace, block) pairs from a Kafka topic and answers block-rejection queries for trace-by-id lookups, with snapshotting, background sweep/garbage-collection, reconstruction, and reconciliation against the tenant index.

# (Optional) PR number(s), e.g. [7339]. Leave blank to auto-fill at release. See
# .chloggen/README.md.
issues: []

# (Optional) Additional lines rendered under the note. Use a pipe (|) for multiline text.
subtext: |
  This lands only the gateway service itself: block-builder/compactor producer hooks, the query-frontend client that would actually filter trace-by-id fan-out, and vulture shadow-mode validation are not yet wired up, so the gateway does not affect the read path until those follow. See `modules/bloomgateway/DESIGN.md` for the full design.

